services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9-eclipse-temurin-21-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/workflow
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
    command:
      - sh
      - -c
      - |
        touch /tmp/.build_ref
        while true; do
          sleep 3
          if find /app/src/main -type f -newer /tmp/.build_ref | grep -q .; then
            echo '[dev] Source changed - recompiling...'
            ./mvnw compile -q -Dmaven.test.skip=true && touch /tmp/.build_ref
          fi
        done &
        exec ./mvnw spring-boot:run
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
      # Polling-based file watching — required for hot-reload on Docker-for-Windows
      WATCHPACK_POLLING: "true"
    command: npm run dev
    depends_on:
      - backend

volumes:
  pgdata:
  maven_cache:
