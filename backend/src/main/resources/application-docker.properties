logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ── DevTools hot-reload (Docker dev only) ─────────────────────────────────────
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2000
spring.devtools.restart.quiet-period=600

# ── Flyway (enabled in production — owns all DDL) ─────────────────────────────
spring.flyway.enabled=true
spring.flyway.schemas=workflow
spring.flyway.locations=classpath:db/migration
# Safety net: if DB exists but has no flyway_schema_history, baseline at 0 so
# V1+ run normally on fresh DBs; existing DBs that already ran V1/V2 already
# have the history table and this setting is ignored.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.properties.hibernate.default_schema=workflow

# ── Disable Spring SQL init (pre-ddl-fixes only needed with ddl-auto=update) ──
spring.sql.init.mode=never
