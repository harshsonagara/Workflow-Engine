spring.application.name=workflow

spring.config.import=optional:file:./.env[.properties]
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# ── HikariCP Connection Pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── Flyway (disabled in dev — Hibernate ddl-auto=update handles schema) ───────
spring.flyway.enabled=false

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.properties.hibernate.default_schema=workflow
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


# ── Pre-DDL fixes (run before Hibernate ddl-auto=update) ─────────────────────
# Handles USING casts that Hibernate cannot emit (e.g. text → jsonb).
# Uses ;; as separator so PL/pgSQL DO $$ blocks with internal ; are not split.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/pre-ddl/pre-ddl-fixes.sql
spring.sql.init.separator=;;

# ── Suppress open-in-view warning ────────────────────────────────────────────
spring.jpa.open-in-view=false

# ── Logging ───────────────────────────────────────────────────────────────────

#show query logs in console
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ── Cache ─────────────────────────────────────────────────────────────────────
# CacheManager bean is explicitly defined in CacheConfig
spring.cache.type=caffeine

# ── JWT (parsed when present; NOT enforced — see SecurityConfig) ─────────────
# HS256 shared secret used to sign (AuthController) and verify (JwtAuthFilter)
# tokens. Override via JWT_SECRET in production; the default is dev-only.
workflow.jwt.secret=${JWT_SECRET:dev-only-workflow-secret-change-in-production-1234}

# ── SLA Scheduler ────────────────────────────────────────────────────────────
workflow.sla.check-interval-ms=300000

# ── Springdoc Swagger UI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
